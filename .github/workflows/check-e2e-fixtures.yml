name: Check e2e fixtures + grading

# One e2e discipline check on committed files (eval/harness/scripts/check_e2e_fixtures.py):
#
# Grading gate (BLOCKING): every run log ADDED in this PR that produced a
# final tree must ship its run-<ts>.ann.json in the same PR. Grading is
# same-PR (the developer + genealogist teams grade every run they commit).
# Treeless runs (crashed/skipped before a tree) are exempt. Scoped to
# PR-added run logs via `git diff --diff-filter=A` (needs BASE_SHA/HEAD_SHA
# and full history).
#
# Fixture *validity* (a fixture having a committed passing run log — spec §14)
# is NOT gated here: it is a recommended authoring practice, not a CI check, so
# a fixture can land without a passing run. It used to be an advisory warning;
# that was removed (it flagged every un-run fixture repo-wide as noise).
#
# This check only reads committed files; it does NOT run a live e2e test
# (those are too expensive to gate PRs — see spec §12).

on:
  pull_request:
    paths:
      - 'eval/tests/e2e/**'
      - 'eval/runlogs/e2e/**'
      - 'eval/harness/scripts/check_e2e_fixtures.py'

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Check out PR with full history
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Check e2e grading gate (blocking)
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: python eval/harness/scripts/check_e2e_fixtures.py
