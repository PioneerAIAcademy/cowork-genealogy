name: Check runlog discipline

# Enforces the per-PR runlog contract per docs/plan/eval-runlog-versioning.md §C6:
#
#   Rule 1 (blocking): At most one newly-added-or-renamed-into-place
#   v{N}.json (released) per eval/runlogs/unit/<skill>/ per PR.
#
#   Rule 2 (blocking): The latest full-skill run log per touched skill
#   must be "active on skill-side files" — its embedded snapshot matches
#   the current PR-branch state of all snapshot-tracked files.
#
#   Rule 2b (warn-only): The same run log's judge_prompt_hash matches the
#   current eval/harness/judge/prompt.md. Mismatch surfaces a warning
#   annotation but does not block merge — judge-prompt edits are a
#   separate project-wide cadence.
#
#   Rule 3 (blocking): The latest full-skill run log's .ann.json contains
#   a correction entry for every (test_id, dimension_source, dimension_name)
#   triple present in the run log.
#
# Scratch runs (scratch_<ts>.json) are gitignored and never reach this
# workflow.

on:
  pull_request:
    paths:
      - 'eval/runlogs/unit/**'
      - 'eval/tests/unit/**'
      - 'plugin/skills/**'
      - 'eval/fixtures/**'
      - 'eval/harness/**'

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Check out PR with full history
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run runlog discipline checks
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: python eval/harness/scripts/check_runlogs.py
