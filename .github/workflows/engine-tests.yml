name: Engine tests

# Runs the MCP server's vitest suite (`packages/engine/mcp-server`, ~1570 tests)
# on PRs that touch anything it covers. Nothing ran this suite in CI before, so
# a red test could sit on main indefinitely — the places-guidance drift lint
# (tests/packaging/skill-guidance.test.ts) did, for three days, after 8bf43be2
# specialized research-plan's copy. This is the same gap eval-harness-tests.yml
# was created to close one layer over, and it names that precedent on purpose.
#
# Path scope covers both halves the suite reads:
#   - packages/engine/mcp-server/**  — the tools, utils, validators under test.
#   - packages/engine/plugin/**      — the packaging tests read the shipped
#     skills, agents, and shared references (manifest drift, dual-spelled agent
#     tool names, skill-description length, the places-guidance drift lint).
# A change to either can red the suite, so either must trigger it.
#
# `npm test` runs the `pretest` build first (tsc), which the packaging tests do
# not strictly need but the tool-dispatch tests do — it also fails the job fast
# on a type error, before vitest starts.

on:
  pull_request:
    paths:
      - 'packages/engine/mcp-server/**'
      - 'packages/engine/plugin/**'
      - '.github/workflows/engine-tests.yml'

jobs:
  vitest:
    runs-on: ubuntu-latest
    steps:
      - name: Check out PR
        uses: actions/checkout@v5

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: packages/engine/mcp-server/package-lock.json

      - name: Install the pinned npm (from the packageManager field)
        run: |
          # Node 22 bundles npm 10.x; the engine's .npmrc sets engine-strict with
          # an npm >=11.12 bound, so install the pinned npm before any engine
          # `npm ci`. Version comes from packageManager (single source of truth).
          NPM_VER="$(node -p "require('./packages/engine/mcp-server/package.json').packageManager.split('@')[1]")"
          npm install -g "npm@${NPM_VER}"
          echo "Using npm $(npm --version)"

      - name: Install dependencies
        working-directory: packages/engine/mcp-server
        run: npm ci

      - name: Run vitest (pretest builds first)
        working-directory: packages/engine/mcp-server
        run: npm test
