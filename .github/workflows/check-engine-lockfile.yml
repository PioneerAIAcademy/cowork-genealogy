name: check-engine-lockfile
# Guards packages/engine/mcp-server/package-lock.json against npm-version churn.
#
# Different npm versions disagree about the `libc` filter tag on rolldown's
# optional native binaries (@rolldown/binding-linux-*): newer npm records it,
# older npm (e.g. 11.7.0) strips it. A developer on a divergent npm who runs
# `npm install` re-normalizes the lockfile, producing a spurious diff that rides
# along in commits.
#
# This job installs with the *canonical* npm — the version pinned in the
# `packageManager` field of packages/engine/mcp-server/package.json — and fails
# the PR if `npm install` would rewrite the lockfile. That keeps laptops honest
# without requiring identical local setups: a lock generated by the wrong npm
# can't reach main.
#
# The build itself uses `npm ci` (never writes the lock, on any npm); this job is
# the separate check that catches a deliberate dep change made with the wrong npm.
on:
  pull_request:
    paths:
      - 'packages/engine/mcp-server/package.json'
      - 'packages/engine/mcp-server/package-lock.json'
permissions:
  contents: read
jobs:
  lockfile-drift:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install the pinned npm (from the packageManager field)
        run: |
          # Node 22 bundles npm 10.x; install the exact npm the engine pins so
          # this gate checks the lock against the canonical version. The version
          # is read from packageManager, so it lives only in package.json.
          NPM_VER="$(node -p "require('./packages/engine/mcp-server/package.json').packageManager.split('@')[1]")"
          npm install -g "npm@${NPM_VER}"
          echo "Using npm $(npm --version)"

      - name: Fail if `npm install` would rewrite the lockfile
        working-directory: packages/engine/mcp-server
        run: |
          npm install --no-audit --no-fund --ignore-scripts
          if ! git diff --exit-code package-lock.json; then
            echo "::error file=packages/engine/mcp-server/package-lock.json::package-lock.json is out of sync with the pinned npm $(npm --version). Your local npm normalized the lockfile differently. Fix: install the pinned npm (npm i -g npm@<version from the packageManager field in package.json>), re-run npm install, and commit package-lock.json."
            exit 1
          fi
