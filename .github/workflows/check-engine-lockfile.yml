name: check-engine-lockfile
# Guards packages/engine/mcp-server/package-lock.json against npm-version churn.
#
# Different npm versions disagree about the `libc` filter tag on rolldown's
# optional native binaries (@rolldown/binding-linux-*): newer npm records it,
# older npm (e.g. 11.7.0) strips it. A developer on a divergent npm who runs
# `npm install` re-normalizes the lockfile, producing a spurious diff that rides
# along in commits.
#
# This job installs with the *canonical* npm — pinned via the `packageManager`
# field in packages/engine/mcp-server/package.json and activated through Corepack,
# so the version lives in exactly one place — and fails the PR if `npm install`
# would rewrite the lockfile. That keeps 20 laptops honest without requiring
# identical local setups: a lock generated by the wrong npm can't reach main.
#
# The build itself uses `npm ci` (never writes the lock, on any npm); this job is
# the separate check that catches a deliberate dep change made with the wrong npm.
on:
  pull_request:
    paths:
      - 'packages/engine/mcp-server/package.json'
      - 'packages/engine/mcp-server/package-lock.json'
permissions:
  contents: read
jobs:
  lockfile-drift:
    runs-on: ubuntu-latest
    env:
      COREPACK_ENABLE_DOWNLOAD_PROMPT: '0'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Activate the pinned npm (packageManager field -> Corepack)
        working-directory: packages/engine/mcp-server
        run: |
          corepack enable
          corepack prepare --activate   # reads `packageManager` from package.json
          echo "Using npm $(npm --version)"

      - name: Fail if `npm install` would rewrite the lockfile
        working-directory: packages/engine/mcp-server
        run: |
          npm install --no-audit --no-fund --ignore-scripts
          if ! git diff --exit-code package-lock.json; then
            echo "::error file=packages/engine/mcp-server/package-lock.json::package-lock.json is out of sync with the pinned npm $(npm --version). Your local npm normalized the lockfile differently. Fix: run \`corepack enable\` in packages/engine/mcp-server, then \`npm install\`, and commit package-lock.json. (Pin is the packageManager field in package.json.)"
            exit 1
          fi
