# Fly.io app config for the hosted genealogy workbench (alpha).
# See docs/plan/fly-deploy-plan.md. ONE always-on container: the FastAPI
# control plane serves the REST + /ws WebSocket API AND the static web client
# from the same origin.
#
# Secrets (E2B_API_KEY, ANTHROPIC_API_KEY, SESSION_SECRET, GOOGLE_CLIENT_ID,
# GOOGLE_CLIENT_SECRET, ABLY_API_KEY) are NOT in this file — set them with
# `fly secrets set`. Only non-secret config lives in [env] below.

app = "genealogy-workbench"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"

[env]
  DATA_DIR = "/data"
  WEB_DIST_DIR = "/app/server/web-dist"
  AGENT_MODE = "real"
  SANDBOX_PROVIDER = "e2b"
  REALTIME = "local_ws"           # alpha relays /ws on this container; flip to "ably" later
  FAMILYSEARCH_WEB_ENABLED = "true"
  DEFAULT_MODEL = "claude-sonnet-4-6"
  # PUBLIC_URL must match the public hostname Fly assigns / you map. Used for
  # OAuth redirect_uri and the `secure` cookie flag (it starts with https).
  PUBLIC_URL = "https://genealogy-workbench.fly.dev"

# SQLite DB + local viewer backup mirror persist on a Fly volume mounted at
# DATA_DIR. Single volume => single instance until Postgres (see plan).
[mounts]
  source = "workbench_data"
  destination = "/data"

[http_service]
  internal_port = 8000
  force_https = true
  # Long-lived /ws sockets: never auto-stop, keep one machine always running.
  auto_stop_machines = false
  auto_start_machines = false
  min_machines_running = 1

  [http_service.concurrency]
    type = "connections"
    # Headroom for many concurrent /ws sockets on the single always-on machine.
    hard_limit = 250
    soft_limit = 200

# Generous deadline: the app does init_db + provider setup on boot, and the
# health check must not flap while sandboxes are being orchestrated.
[[http_service.checks]]
  method = "GET"
  path = "/api/health"
  interval = "15s"
  timeout = "5s"
  grace_period = "20s"

[[vm]]
  size = "shared-cpu-1x"
  memory = "1gb"
